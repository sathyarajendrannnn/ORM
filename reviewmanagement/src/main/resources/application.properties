# Server
server.port=${PORT:8080}

# Database - switches automatically based on environment
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reviewdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mysql@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024OnlineReviewSystem}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${FRONTEND_URLS:http://localhost:3000,http://localhost:3003,http://localhost:5173}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.reviewmanagement=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
